<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8623A"/>
      <stop offset="100%" stop-color="#F4A46A"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="114" ry="114"/>
    </clipPath>
  </defs>
  <!-- 背景 -->
  <rect width="512" height="512" rx="114" fill="url(#bg)"/>
  <!-- 蜜字 -->
  <text x="148" y="320" font-family="PingFang TC, Microsoft JhengHei, sans-serif"
        font-size="260" font-weight="800" fill="white" opacity="1">蜜</text>
  <!-- 底部英文 -->
  <text x="256" y="440" font-family="PingFang TC, Microsoft JhengHei, sans-serif"
        font-size="72" font-weight="400" fill="rgba(255,255,255,0.75)"
        text-anchor="middle">MiYou</text>
  <!-- 裝飾花朵 -->
  <text x="390" y="130" font-size="72" text-anchor="middle">🌸</text>
</svg>
